version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: sikayetimvar-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sikayetimvar
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - default
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

volumes:
  mysql-data:

networks:
  default:
    driver: bridge
