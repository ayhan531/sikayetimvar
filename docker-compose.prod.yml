version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sikayetimvar-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-production_password}
      MYSQL_DATABASE: sikayetimvar
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: always
    networks:
      - sikayetimvar-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sikayetimvar-backend
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-production_password}
      DATABASE_NAME: sikayetimvar
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always
    networks:
      - sikayetimvar-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sikayetimvar-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - sikayetimvar-network

volumes:
  mysql-data:

networks:
  sikayetimvar-network:
    driver: bridge
